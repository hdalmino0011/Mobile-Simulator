<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital ATM – Browser Simulator</title>

    <!-- ============================================
    STYLES
    ============================================ -->
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* ----- SIMULATOR CONTAINER ----- */
        .simulator-wrapper {
            width: 100%;
            max-width: 430px;
            /* iPhone / Android phone width */
            height: 932px;
            /* iPhone 16 Pro-ish height */
            max-height: 95vh;
            background: #000;
            border-radius: 44px;
            padding: 12px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }

        /* The actual phone screen */
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 36px;
            overflow: hidden;
            background: #f5f5f7;
            position: relative;
        }

        /* ----- PLATFORM SELECTOR (overlay) ----- */
        .platform-selector {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            border-radius: 36px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .platform-selector.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        .platform-selector h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .platform-selector .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.5;
        }

        .platform-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 320px;
        }

        .platform-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            text-align: left;
        }

        .platform-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .platform-btn:active {
            transform: scale(0.97);
        }

        .platform-btn .icon {
            font-size: 32px;
            line-height: 1;
        }

        .platform-btn .label {
            display: flex;
            flex-direction: column;
        }

        .platform-btn .label small {
            font-weight: 400;
            font-size: 13px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .platform-btn.ios {
            background: rgba(0, 122, 255, 0.2);
            border-color: rgba(0, 122, 255, 0.3);
        }

        .platform-btn.android {
            background: rgba(52, 168, 83, 0.2);
            border-color: rgba(52, 168, 83, 0.3);
        }

        /* ----- CUSTOMER TYPE TOGGLE (inside content) ----- */
        .customer-toggle-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: #f1f1f4;
            border-radius: 12px;
            padding: 4px;
        }

        .customer-toggle-wrapper button {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s;
            background: transparent;
            color: #6c6c70;
        }

        .customer-toggle-wrapper button.active {
            background: #ffffff;
            color: #1c1c1e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .customer-toggle-wrapper button:active {
            transform: scale(0.96);
        }

        /* ----- BROWSER CHROME CONTAINERS ----- */
        .browser-container {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: #fff;
            position: relative;
            border-radius: 36px;
            overflow: hidden;
        }

        .browser-container.active {
            display: flex;
        }

        /* ============================================
        iOS 26 SAFARI – LIQUID GLASS DESIGN
        ============================================ */
        #safari-container {
            background: #f5f5f7;
        }

        /* Safari Content Area (takes remaining space) */
        .safari-content {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            padding: 20px 16px 100px;
            /* space for bottom toolbar */
            scroll-behavior: smooth;
        }

        /* Safari Bottom Toolbar – Liquid Glass */
        .safari-toolbar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px) saturate(1.4);
            -webkit-backdrop-filter: blur(30px) saturate(1.4);
            border-radius: 34px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            height: 52px;
            z-index: 10;
        }

        /* Collapsed state – smaller when scrolled */
        .safari-toolbar.collapsed {
            height: 38px;
            padding: 4px 12px;
            border-radius: 24px;
            backdrop-filter: blur(40px) saturate(1.6);
            -webkit-backdrop-filter: blur(40px) saturate(1.6);
        }

        .safari-toolbar .left-group,
        .safari-toolbar .right-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .safari-toolbar .url-pill {
            flex: 1;
            background: rgba(120, 120, 128, 0.12);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #1c1c1e;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
            letter-spacing: -0.2px;
        }

        .safari-toolbar.collapsed .url-pill {
            font-size: 11px;
            padding: 4px 12px;
            background: rgba(120, 120, 128, 0.08);
        }

        .safari-toolbar .icon-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #1c1c1e;
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .safari-toolbar .icon-btn:active {
            background: rgba(0, 0, 0, 0.08);
            transform: scale(0.92);
        }

        .safari-toolbar .icon-btn.more-btn {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -1px;
        }

        .safari-toolbar .icon-btn.tabs-btn {
            background: rgba(0, 122, 255, 0.10);
            font-weight: 600;
            font-size: 15px;
            color: #007aff;
            width: 32px;
            height: 32px;
            border-radius: 10px;
        }

        /* Safari status bar simulation */
        .safari-status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 20px 4px;
            font-size: 12px;
            font-weight: 600;
            color: #1c1c1e;
            background: transparent;
            position: relative;
            z-index: 5;
            letter-spacing: 0.3px;
        }

        /* ============================================
        ANDROID CHROME – MATERIAL YOU
        ============================================ */
        #chrome-container {
            background: #f8f9fa;
        }

        /* Chrome Top Bar */
        .chrome-topbar {
            background: #ffffff;
            padding: 8px 12px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        .chrome-topbar .back-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #3c4043;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .chrome-topbar .back-btn:active {
            background: rgba(0, 0, 0, 0.06);
        }

        .chrome-topbar .url-bar {
            flex: 1;
            background: #f1f3f4;
            border-radius: 24px;
            padding: 6px 16px;
            font-size: 14px;
            color: #1a1a1e;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            border: 0.5px solid transparent;
            transition: border 0.2s;
            height: 40px;
        }

        .chrome-topbar .url-bar .lock-icon {
            font-size: 14px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .chrome-topbar .url-bar .url-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        .chrome-topbar .url-bar .url-text .domain {
            font-weight: 500;
        }

        .chrome-topbar .menu-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #3c4043;
            cursor: pointer;
            padding: 4px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .chrome-topbar .menu-btn:active {
            background: rgba(0, 0, 0, 0.06);
        }

        /* Chrome Content */
        .chrome-content {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            padding: 20px 16px 90px;
            scroll-behavior: smooth;
        }

        /* Chrome Bottom Bar */
        .chrome-bottombar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 0.5px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 6px 8px 10px;
            flex-shrink: 0;
            z-index: 10;
        }

        .chrome-bottombar .bottom-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 10px;
            color: #5f6368;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            transition: background 0.15s;
            font-weight: 500;
        }

        .chrome-bottombar .bottom-btn .icon {
            font-size: 22px;
            line-height: 1.2;
        }

        .chrome-bottombar .bottom-btn:active {
            background: rgba(0, 0, 0, 0.04);
        }

        .chrome-bottombar .bottom-btn.active {
            color: #1a73e8;
        }

        /* ============================================
        SHARED CONTENT (Digital ATM screens)
        ============================================ */
        .step-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Step content styling */
        .step-content .step-indicator {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .step-content .vip-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step-content h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1c1c1e;
            letter-spacing: -0.4px;
            line-height: 1.2;
        }

        .step-content .subtitle {
            font-size: 16px;
            font-weight: 500;
            color: #3a3a3c;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .step-content .subtitle strong {
            color: #1c1c1e;
        }

        .step-content p {
            font-size: 15px;
            line-height: 1.6;
            color: #3a3a3c;
            margin-bottom: 10px;
        }

        .step-content .bullet-list {
            list-style: none;
            padding: 0;
            margin: 8px 0 12px;
        }

        .step-content .bullet-list li {
            font-size: 15px;
            line-height: 1.6;
            color: #3a3a3c;
            padding: 2px 0 2px 20px;
            position: relative;
        }

        .step-content .bullet-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #007aff;
            font-weight: 700;
        }

        .step-content .product-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin: 12px 0 16px;
            border: 0.5px solid #e5e5ea;
        }

        .step-content .product-card .product-title {
            font-weight: 600;
            font-size: 15px;
            color: #1c1c1e;
            line-height: 1.4;
        }

        .step-content .product-card .product-sub {
            font-size: 13px;
            color: #6c6c70;
            margin-top: 4px;
        }

        .step-content .btn-primary {
            display: inline-block;
            background: #007aff;
            color: #fff;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .step-content .btn-primary:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .step-content .btn-secondary {
            display: inline-block;
            background: #e5e5ea;
            color: #1c1c1e;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .step-content .btn-secondary:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .step-content .support-callout {
            background: #f1f1f4;
            border-radius: 12px;
            padding: 14px 16px;
            margin: 12px 0 16px;
            border-left: 4px solid #007aff;
        }

        .step-content .support-callout .phone {
            font-weight: 700;
            color: #1c1c1e;
            font-size: 16px;
        }

        .step-content .progress-bar {
            display: flex;
            gap: 6px;
            margin: 12px 0 16px;
            background: #f1f1f4;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #6c6c70;
        }

        .step-content .progress-bar .highlight {
            color: #007aff;
            font-weight: 600;
        }

        .step-content .name-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .step-content .name-suggestions .chip {
            background: #f1f1f4;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #1c1c1e;
            border: 1px solid #e5e5ea;
            cursor: pointer;
            transition: all 0.2s;
        }

        .step-content .name-suggestions .chip:active {
            background: #007aff;
            color: #fff;
            border-color: #007aff;
        }

        .step-content .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 400;
            color: #1c1c1e;
            background: #f8f9fa;
            transition: border 0.2s;
            margin: 8px 0 12px;
        }

        .step-content .input-field:focus {
            border-color: #007aff;
            outline: none;
            background: #fff;
        }

        .step-content .input-field::placeholder {
            color: #8e8e93;
        }

        .step-content .video-container {
            background: #000;
            border-radius: 12px;
            padding: 20px;
            margin: 12px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            position: relative;
        }

        .step-content .video-container .play-icon {
            font-size: 48px;
            opacity: 0.8;
        }

        .step-content .video-container .duration {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin-top: 6px;
        }

        .step-content .video-container .video-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 4px;
        }

        .step-content .ai-prompts {
            margin: 12px 0;
        }

        .step-content .ai-prompts .prompt-group {
            margin-bottom: 12px;
        }

        .step-content .ai-prompts .prompt-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 4px;
        }

        .step-content .ai-prompts .prompt-group .hint {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 400;
        }

        .step-content .ai-prompts .prompt-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e5ea;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            color: #1c1c1e;
            background: #f8f9fa;
            resize: vertical;
            min-height: 50px;
            transition: border 0.2s;
        }

        .step-content .ai-prompts .prompt-group textarea:focus {
            border-color: #007aff;
            outline: none;
            background: #fff;
        }

        .step-content .ai-prompts .prompt-group textarea::placeholder {
            color: #8e8e93;
        }

        /* Navigation buttons at bottom of content */
        .content-nav {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-bottom: 4px;
        }

        .content-nav button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .content-nav .btn-back {
            background: #e5e5ea;
            color: #1c1c1e;
        }

        .content-nav .btn-back:active {
            background: #d1d1d6;
        }

        .content-nav .btn-next {
            background: #007aff;
            color: #fff;
        }

        .content-nav .btn-next:active {
            opacity: 0.8;
            transform: scale(0.97);
        }

        .content-nav .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar styling */
        .safari-content::-webkit-scrollbar,
        .chrome-content::-webkit-scrollbar {
            width: 3px;
        }

        .safari-content::-webkit-scrollbar-thumb,
        .chrome-content::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }

        .safari-content::-webkit-scrollbar-track,
        .chrome-content::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ============================================
        RESPONSIVE
        ============================================ */
        @media (max-width: 480px) {
            .simulator-wrapper {
                border-radius: 0;
                padding: 0;
                max-height: 100vh;
                height: 100vh;
            }
            .phone-screen {
                border-radius: 0;
            }
            .platform-selector {
                border-radius: 0;
            }
            .browser-container {
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }

        @media (max-height: 700px) {
            .simulator-wrapper {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                padding: 0;
            }
            .phone-screen {
                border-radius: 0;
            }
            .platform-selector {
                border-radius: 0;
            }
            .browser-container {
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================
    SIMULATOR WRAPPER
    ============================================ -->
    <div class="simulator-wrapper">
        <div class="phone-screen">

            <!-- ==========================================
            PLATFORM SELECTOR
            ========================================== -->
            <div class="platform-selector" id="platformSelector">
                <h1>📱 Browser Simulator</h1>
                <p class="sub">Choose your browser to simulate the Digital ATM onboarding flow</p>
                <div class="platform-grid">
                    <button class="platform-btn ios" data-platform="safari">
                        <span class="icon">🧭</span>
                        <span class="label">
                            iOS 26 Safari
                            <small>Liquid Glass · Compact layout</small>
                        </span>
                    </button>
                    <button class="platform-btn android" data-platform="chrome">
                        <span class="icon">🌐</span>
                        <span class="label">
                            Android Chrome
                            <small>Material You · Latest version</small>
                        </span>
                    </button>
                </div>
            </div>

            <!-- ==========================================
            iOS 26 SAFARI
            ========================================== -->
            <div class="browser-container" id="safari-container">
                <!-- Status Bar -->
                <div class="safari-status-bar">
                    <span>9:41</span>
                    <span>📶 🔋</span>
                </div>

                <!-- Content -->
                <div class="safari-content" id="safariContent">
                    <div id="safariStepContainer"></div>
                </div>

                <!-- Bottom Toolbar – Liquid Glass -->
                <div class="safari-toolbar" id="safariToolbar">
                    <div class="left-group">
                        <button class="icon-btn" id="safariBackBtn" aria-label="Back">◀</button>
                    </div>
                    <div class="url-pill" id="safariUrl">digitalatm.com</div>
                    <div class="right-group">
                        <button class="icon-btn more-btn" aria-label="More">•••</button>
                        <button class="icon-btn tabs-btn" id="safariTabsBtn" aria-label="Tabs">0</button>
                    </div>
                </div>
            </div>

            <!-- ==========================================
            ANDROID CHROME
            ========================================== -->
            <div class="browser-container" id="chrome-container">
                <!-- Top Bar -->
                <div class="chrome-topbar">
                    <button class="back-btn" id="chromeBackBtn">‹</button>
                    <div class="url-bar">
                        <span class="lock-icon">🔒</span>
                        <span class="url-text" id="chromeUrl">
                            <span class="domain">digitalatm</span>.com
                        </span>
                    </div>
                    <button class="menu-btn" id="chromeMenuBtn">⋮</button>
                </div>

                <!-- Content -->
                <div class="chrome-content" id="chromeContent">
                    <div id="chromeStepContainer"></div>
                </div>

                <!-- Bottom Bar -->
                <div class="chrome-bottombar">
                    <button class="bottom-btn" id="chromeHomeBtn">
                        <span class="icon">🏠</span>
                        Home
                    </button>
                    <button class="bottom-btn" id="chromeNewTabBtn">
                        <span class="icon">➕</span>
                        New tab
                    </button>
                    <button class="bottom-btn active" id="chromeTabsBtn">
                        <span class="icon">🔲</span>
                        <span id="chromeTabCount">0</span>
                    </button>
                    <button class="bottom-btn" id="chromeMoreBtn">
                        <span class="icon">⋮</span>
                        More
                    </button>
                </div>
            </div>

        </div><!-- /phone-screen -->
    </div><!-- /simulator-wrapper -->

    <!-- ============================================
    LOAD DATA
    ============================================ -->
    <script src="js/data.js"></script>

    <!-- ============================================
    MAIN APPLICATION SCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ----- STATE -----
            const state = {
                platform: null, // 'safari' | 'chrome' | null
                customerType: 'core', // 'core' | 'vip'
                currentStep: 0,
                totalSteps: 0,
                tabCount: 3,
            };

            // ----- DOM REFS -----
            const platformSelector = document.getElementById('platformSelector');
            const safariContainer = document.getElementById('safari-container');
            const chromeContainer = document.getElementById('chrome-container');
            const safariContent = document.getElementById('safariContent');
            const chromeContent = document.getElementById('chromeContent');
            const safariStepContainer = document.getElementById('safariStepContainer');
            const chromeStepContainer = document.getElementById('chromeStepContainer');
            const safariUrl = document.getElementById('safariUrl');
            const chromeUrl = document.getElementById('chromeUrl');
            const safariToolbar = document.getElementById('safariToolbar');
            const safariTabsBtn = document.getElementById('safariTabsBtn');
            const chromeTabCount = document.getElementById('chromeTabCount');

            // ----- GET DATA -----
            function getSteps() {
                if (!window.STEP_DATA) {
                    console.error('❌ STEP_DATA not loaded! Make sure js/data.js is loaded.');
                    return [];
                }
                return window.STEP_DATA[state.customerType] || window.STEP_DATA.core || [];
            }

            // ----- RENDER STEP -----
            function renderStep() {
                const steps = getSteps();
                state.totalSteps = steps.length;

                if (state.totalSteps === 0) {
                    safariStepContainer.innerHTML =
                        '<p style="padding:40px;text-align:center;color:#8e8e93;">⚠️ No data loaded. Check js/data.js</p>';
                    chromeStepContainer.innerHTML =
                        '<p style="padding:40px;text-align:center;color:#8e8e93;">⚠️ No data loaded. Check js/data.js</p>';
                    return;
                }

                // Clamp step
                if (state.currentStep >= state.totalSteps) {
                    state.currentStep = state.totalSteps - 1;
                }
                if (state.currentStep < 0) {
                    state.currentStep = 0;
                }

                const step = steps[state.currentStep] || steps[0];
                const stepNumber = state.currentStep + 1;
                const total = state.totalSteps;
                const customerLabel = state.customerType === 'core' ? 'Core Standard' : 'VIP Speedrun';
                const isVip = state.customerType === 'vip';

                // Update tab count
                safariTabsBtn.textContent = state.tabCount;
                chromeTabCount.textContent = state.tabCount;

                // Update URL
                const urlText = `digitalatm.com/step-${stepNumber}`;
                safariUrl.textContent = urlText;
                const domainMatch = urlText.match(/^([^.]+)/);
                chromeUrl.innerHTML = domainMatch ?
                    `<span class="domain">${domainMatch[1]}</span>.com/step-${stepNumber}` :
                    urlText;

                // Build HTML
                let html = `
                    <div class="step-content active">
                        <div class="step-indicator">
                            ${customerLabel} · Step ${stepNumber} of ${total}
                        </div>
                `;

                // VIP badge
                if (isVip) {
                    html += `<div class="vip-badge">⭐ VIP Speedrun</div>`;
                }

                // Title
                html += `<h2>${step.title || 'Untitled'}</h2>`;

                // Subtitle
                if (step.subtitle) {
                    html += `<div class="subtitle">${step.subtitle}</div>`;
                }

                // Video placeholder
                if (step.showVideo) {
                    html += `
                        <div class="video-container">
                            <div class="play-icon">▶</div>
                            <div class="duration">${step.videoDuration || '1:40'}</div>
                            <div class="video-label">🎬 HEY, I'M RYAN.</div>
                        </div>
                    `;
                }

                // Paragraphs
                if (step.paragraphs) {
                    step.paragraphs.forEach(function(p) {
                        if (p.startsWith('•')) {
                            // Already handled as bullet, skip
                        } else {
                            html += `<p>${p}</p>`;
                        }
                    });
                }

                // Bullet lists
                if (step.paragraphs) {
                    const bullets = step.paragraphs.filter(function(p) { return p.startsWith('•'); });
                    if (bullets.length > 0) {
                        html += `<ul class="bullet-list">`;
                        bullets.forEach(function(b) {
                            html += `<li>${b.replace('•', '').trim()}</li>`;
                        });
                        html += `</ul>`;
                    }
                }

                // Progress bar
                if (step.progress) {
                    html += `
                        <div class="progress-bar">
                            <span>Now: <span class="highlight">${step.progress.now || ''}</span></span>
                            <span>·</span>
                            <span>Next: ${step.progress.next || ''}</span>
                        </div>
                    `;
                }

                // Product card
                if (step.product) {
                    html += `
                        <div class="product-card">
                            <div class="product-title">${step.product.name || step.product.shortName || 'Product'}</div>
                            <div class="product-sub">${step.product.shortName || ''}</div>
                        </div>
                    `;
                }

                // Name suggestions
                if (step.nameSuggestions) {
                    html += `<div class="name-suggestions">`;
                    step.nameSuggestions.forEach(function(suggestion) {
                        html += `<span class="chip">${suggestion}</span>`;
                    });
                    html += `</div>`;
                    if (step.inputPlaceholder) {
                        html += `<input class="input-field" type="text" placeholder="${step.inputPlaceholder}" />`;
                    }
                }

                // AI prompts
                if (step.aiPrompts) {
                    html += `<div class="ai-prompts">`;
                    step.aiPrompts.forEach(function(prompt) {
                        html += `
                            <div class="prompt-group">
                                <label>${prompt.label} <span class="hint">(optional)</span></label>
                                <textarea placeholder="${prompt.placeholder}"></textarea>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                // Example products
                if (step.exampleProducts) {
                    html += `<div style="margin: 12px 0;"><p style="font-weight:600;font-size:14px;color:#1c1c1e;">📦 Pick one to start:</p>`;
                    step.exampleProducts.forEach(function(product) {
                        html += `
                            <div style="background:#f8f9fa;border-radius:12px;padding:12px;margin:6px 0;border:0.5px solid #e5e5ea;font-size:14px;color:#3a3a3c;">
                                ${product}
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                // Support callout
                if (step.supportPhone || step.supportLabel) {
                    html += `
                        <div class="support-callout">
                            ${step.supportPhone ? `<div class="phone">📞 ${step.supportPhone}</div>` : ''}
                            ${step.supportLabel ? `<div style="font-size:14px;color:#3a3a3c;margin-top:4px;">${step.supportLabel}</div>` : ''}
                        </div>
                    `;
                }

                // Buttons
                if (step.primaryButton) {
                    html += `<button class="btn-primary" id="stepPrimaryBtn">${step.primaryButton}</button>`;
                }
                if (step.secondaryButton) {
                    html += `<button class="btn-secondary" id="stepSecondaryBtn">${step.secondaryButton}</button>`;
                }

                // Live URL
                if (step.liveUrl) {
                    html += `
                        <div style="background:#e8f5e9;border-radius:12px;padding:12px;margin:12px 0;border-left:4px solid #4caf50;">
                            <div style="font-weight:600;font-size:14px;color:#1c1c1e;">🌐 Live at:</div>
                            <div style="font-size:14px;color:#2e7d32;word-break:break-all;">${step.liveUrl}</div>
                            ${step.author ? `<div style="font-size:13px;color:#6c6c70;margin-top:4px;">by ${step.author}</div>` : ''}
                        </div>
                    `;
                }

                // Navigation
                html += `
                        <div class="content-nav">
                            <button class="btn-back" id="stepBackBtn" ${state.currentStep === 0 ? 'disabled' : ''}>← Back</button>
                            <button class="btn-next" id="stepNextBtn">
                                ${state.currentStep === total - 1 ? '✅ Done' : 'Next →'}
                            </button>
                        </div>
                    </div>
                `;

                // Inject into both containers
                safariStepContainer.innerHTML = html;
                chromeStepContainer.innerHTML = html;

                // ----- BIND EVENTS -----

                // Back button
                const backBtn = document.getElementById('stepBackBtn');
                if (backBtn) {
                    backBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (state.currentStep > 0) {
                            state.currentStep--;
                            renderStep();
                            scrollToTop();
                        }
                    });
                }

                // Next button
                const nextBtn = document.getElementById('stepNextBtn');
                if (nextBtn) {
                    nextBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (state.currentStep < state.totalSteps - 1) {
                            state.currentStep++;
                            renderStep();
                            scrollToTop();
                        }
                    });
                }

                // Primary button
                const primaryBtn = document.getElementById('stepPrimaryBtn');
                if (primaryBtn) {
                    primaryBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        // If it's the "Publish" or "Let's get this one live" button, advance
                        const text = this.textContent.trim();
                        if (text === 'Publish my site' || text === 'Let\'s get this one live' ||
                            text === 'That\'s my note, continue' || text === 'Yes, that\'s it' ||
                            text === 'I watched it, let\'s build' || text === 'This is my address' ||
                            text === 'Done, bookmarked' || text === 'Keep going in the playbook' ||
                            text === 'Add it to my site' || text === 'Claim My Digital Real Estate' ||
                            text === 'Start My Done-With-You Setup' || text === 'Visit my site') {
                            if (state.currentStep < state.totalSteps - 1) {
                                state.currentStep++;
                                renderStep();
                                scrollToTop();
                            }
                        } else {
                            // Just show feedback
                            console.log('🔘 Primary button clicked:', text);
                            alert(`🔘 "${text}" clicked (simulated)`);
                        }
                    });
                }

                // Secondary button
                const secondaryBtn = document.getElementById('stepSecondaryBtn');
                if (secondaryBtn) {
                    secondaryBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const text = this.textContent.trim();
                        console.log('🔘 Secondary button clicked:', text);
                        if (text.includes('Talk to someone') || text.includes('Do it for me')) {
                            alert(`📞 "${text}" clicked (simulated)`);
                        } else if (text === 'Show me others') {
                            alert('📦 Showing more product suggestions (simulated)');
                        } else if (text === 'Just chat instead') {
                            alert('💬 Chat mode activated (simulated)');
                        } else {
                            alert(`🔘 "${text}" clicked (simulated)`);
                        }
                    });
                }

                // Name suggestion chips
                document.querySelectorAll('.name-suggestions .chip').forEach(function(chip) {
                    chip.addEventListener('click', function() {
                        const input = this.closest('.step-content').querySelector('.input-field');
                        if (input) {
                            input.value = this.textContent.trim();
                            input.style.borderColor = '#4caf50';
                            setTimeout(function() {
                                input.style.borderColor = '#e5e5ea';
                            }, 1000);
                        }
                    });
                });

                // Update toolbar collapse state
                updateToolbarCollapse();

                // Also update on next tick for content height changes
                setTimeout(updateToolbarCollapse, 100);
            }

            // ----- TOOLBAR COLLAPSE (Safari) -----
            function updateToolbarCollapse() {
                const content = state.platform === 'safari' ? safariContent : chromeContent;
                if (!content) return;
                const isScrolled = content.scrollTop > 20;
                if (state.platform === 'safari' && safariToolbar) {
                    safariToolbar.classList.toggle('collapsed', isScrolled);
                }
            }

            function scrollToTop() {
                const content = state.platform === 'safari' ? safariContent : chromeContent;
                if (content) {
                    content.scrollTop = 0;
                    setTimeout(updateToolbarCollapse, 50);
                }
            }

            // ----- SWITCH PLATFORM -----
            function switchPlatform(platform) {
                state.platform = platform;

                // Hide selector
                platformSelector.classList.add('hidden');

                // Hide all containers
                safariContainer.classList.remove('active');
                chromeContainer.classList.remove('active');

                // Show selected
                if (platform === 'safari') {
                    safariContainer.classList.add('active');
                } else if (platform === 'chrome') {
                    chromeContainer.classList.add('active');
                }

                // Reset step to 0
                state.currentStep = 0;
                renderStep();

                // Attach scroll listeners for toolbar collapse
                const content = platform === 'safari' ? safariContent : chromeContent;
                if (content) {
                    // Remove old listener to avoid duplicates
                    content.removeEventListener('scroll', updateToolbarCollapse);
                    content.addEventListener('scroll', updateToolbarCollapse);
                }
            }

            // ----- CUSTOMER TYPE TOGGLE (via console) -----
            window.setCustomerType = function(type) {
                if (type === 'core' || type === 'vip') {
                    state.customerType = type;
                    state.currentStep = 0;
                    renderStep();
                    scrollToTop();
                    console.log(`🔄 Switched to ${type === 'core' ? 'Core Standard' : 'VIP Speedrun'}`);
                } else {
                    console.warn('⚠️ Use setCustomerType("core") or setCustomerType("vip")');
                }
            };

            // ----- PLATFORM SELECTOR EVENTS -----
            document.querySelectorAll('.platform-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const platform = this.dataset.platform;
                    switchPlatform(platform);
                });
            });

            // ----- SAFARI BROWSER CONTROLS -----
            const safariBackBtn = document.getElementById('safariBackBtn');
            if (safariBackBtn) {
                safariBackBtn.addEventListener('click', function() {
                    if (state.currentStep > 0) {
                        state.currentStep--;
                        renderStep();
                        scrollToTop();
                    }
                });
            }

            const safariTabsBtnEl = document.getElementById('safariTabsBtn');
            if (safariTabsBtnEl) {
                safariTabsBtnEl.addEventListener('click', function() {
                    state.tabCount = Math.min(state.tabCount + 1, 99);
                    renderStep();
                });
            }

            // ----- CHROME BROWSER CONTROLS -----
            const chromeBackBtn = document.getElementById('chromeBackBtn');
            if (chromeBackBtn) {
                chromeBackBtn.addEventListener('click', function() {
                    if (state.currentStep > 0) {
                        state.currentStep--;
                        renderStep();
                        scrollToTop();
                    }
                });
            }

            const chromeTabsBtnEl = document.getElementById('chromeTabsBtn');
            if (chromeTabsBtnEl) {
                chromeTabsBtnEl.addEventListener('click', function() {
                    state.tabCount = Math.min(state.tabCount + 1, 99);
                    renderStep();
                });
            }

            const chromeHomeBtn = document.getElementById('chromeHomeBtn');
            if (chromeHomeBtn) {
                chromeHomeBtn.addEventListener('click', function() {
                    state.currentStep = 0;
                    renderStep();
                    scrollToTop();
                });
            }

            const chromeNewTabBtn = document.getElementById('chromeNewTabBtn');
            if (chromeNewTabBtn) {
                chromeNewTabBtn.addEventListener('click', function() {
                    state.tabCount = Math.min(state.tabCount + 1, 99);
                    renderStep();
                });
            }

            const chromeMenuBtn = document.getElementById('chromeMenuBtn');
            if (chromeMenuBtn) {
                chromeMenuBtn.addEventListener('click', function() {
                    alert('📱 Chrome menu opened (simulated)');
                });
            }

            const chromeMoreBtn = document.getElementById('chromeMoreBtn');
            if (chromeMoreBtn) {
                chromeMoreBtn.addEventListener('click', function() {
                    alert('📱 Chrome more options (simulated)');
                });
            }

            // ----- KEYBOARD SHORTCUTS -----
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    if (state.currentStep < state.totalSteps - 1) {
                        state.currentStep++;
                        renderStep();
                        scrollToTop();
                        e.preventDefault();
                    }
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    if (state.currentStep > 0) {
                        state.currentStep--;
                        renderStep();
                        scrollToTop();
                        e.preventDefault();
                    }
                } else if (e.key === 'c' || e.key === 'C') {
                    // Toggle customer type with 'C' key
                    const newType = state.customerType === 'core' ? 'vip' : 'core';
                    window.setCustomerType(newType);
                    e.preventDefault();
                }
            });

            // ----- CHECK DATA LOAD -----
            function init() {
                if (window.STEP_DATA) {
                    console.log('✅ STEP_DATA loaded successfully!');
                    console.log(`   Core: ${window.STEP_DATA.core?.length || 0} steps`);
                    console.log(`   VIP: ${window.STEP_DATA.vip?.length || 0} steps`);
                } else {
                    console.error('❌ STEP_DATA not found!');
                    // Show error in containers
                    safariStepContainer.innerHTML = `
                        <div style="padding:40px;text-align:center;color:#8e8e93;">
                            <h3>⚠️ Data Not Loaded</h3>
                            <p>Make sure <strong>js/data.js</strong> is in the correct folder.</p>
                            <p style="font-size:13px;margin-top:8px;">File path: <code>digital-atm-simulator/js/data.js</code></p>
                        </div>
                    `;
                    chromeStepContainer.innerHTML = `
                        <div style="padding:40px;text-align:center;color:#8e8e93;">
                            <h3>⚠️ Data Not Loaded</h3>
                            <p>Make sure <strong>js/data.js</strong> is in the correct folder.</p>
                            <p style="font-size:13px;margin-top:8px;">File path: <code>digital-atm-simulator/js/data.js</code></p>
                        </div>
                    `;
                }
            }

            // ----- INIT -----
            init();

            // Start with platform selector visible
            platformSelector.classList.remove('hidden');
            safariContainer.classList.remove('active');
            chromeContainer.classList.remove('active');

            console.log('📱 Digital ATM Browser Simulator loaded.');
            console.log('💡 Select a platform to begin.');
            console.log('🔄 Use Arrow keys (← →) to navigate steps.');
            console.log('⌨️  Press "C" to toggle between Core and VIP.');
            console.log('👤 Switch customer type: window.setCustomerType("core"|"vip")');

        })();
    </script>
