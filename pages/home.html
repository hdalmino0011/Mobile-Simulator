<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Google</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#fff;color:#202124;min-height:100vh}
    .header{display:flex;align-items:center;justify-content:flex-end;padding:12px 16px;gap:16px}
    .header-icon{width:22px;height:22px;color:#5f6368;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .header-icon svg{width:22px;height:22px}
    .sign-in{background:#1a73e8;color:#fff;border:none;border-radius:20px;padding:7px 18px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
    .sign-in:active{background:#1557b0}

    /* Nav tabs */
    .nav-tabs{display:flex;border-bottom:1px solid #e0e0e0;padding:0 10px}
    .nav-tab{padding:12px 14px;font-size:13px;font-weight:600;color:#5f6368;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;letter-spacing:.3px}
    .nav-tab.active{color:#1a73e8;border-color:#1a73e8}
    .images-tab{color:#5f6368;font-size:13px;padding:12px 14px;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent}
    .images-tab:active{color:#1a73e8}

    /* Doodle area */
    .doodle-wrap{padding:24px 0 12px;display:flex;flex-direction:column;align-items:center;gap:16px}
    .google-logo{font-size:0;line-height:1;position:relative;width:200px;height:68px;display:flex;align-items:center;justify-content:center}
    .logo-svg{width:196px;height:64px}

    /* Search box */
    .search-wrap{padding:0 16px;width:100%}
    .search-box{border:1px solid #dfe1e5;border-radius:24px;padding:11px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .search-box:active{box-shadow:0 2px 8px rgba(0,0,0,.12)}
    .search-box svg{width:20px;height:20px;color:#9aa0a6;flex-shrink:0}
    .search-placeholder{flex:1;font-size:16px;color:#9aa0a6}
    .search-icons{display:flex;gap:10px;align-items:center}
    .search-icons svg{width:22px;height:22px;color:#4285f4}

    /* Promo link */
    .promo{text-align:center;padding:14px 16px 0}
    .promo a{color:#1a73e8;font-size:14px;text-decoration:none}

    /* Trending */
    .section-title{font-size:16px;font-weight:700;color:#202124;padding:18px 16px 8px;display:flex;align-items:center;justify-content:space-between}
    .section-more{color:#5f6368}
    .section-more svg{width:20px;height:20px}

    .trend-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s}
    .trend-item:active{background:#f8f9fa}
    .trend-icon{width:20px;height:20px;color:#9aa0a6;flex-shrink:0}
    .trend-icon svg{width:20px;height:20px}
    .trend-text{flex:1;font-size:15px;color:#202124}
    .trend-arrow{color:#9aa0a6}
    .trend-arrow svg{width:18px;height:18px}

    @media(prefers-color-scheme:dark){
      body{background:#202124;color:#e8eaed}
      .search-box{background:#303134;border-color:#5f6368;box-shadow:none}
      .search-placeholder{color:#9aa0a6}
      .section-title{color:#e8eaed}
      .trend-item{border-color:#3c4043}
      .trend-text{color:#e8eaed}
      .trend-item:active{background:#3c4043}
    }
  </style>
</head>
