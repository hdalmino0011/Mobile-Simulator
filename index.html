<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital ATM – Browser Simulator</title>

    <!-- ============================================
    STYLES
    ============================================ -->
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* ----- SIMULATOR CONTAINER ----- */
        .simulator-wrapper {
            width: 100%;
            max-width: 430px;
            /* iPhone / Android phone width */
            height: 932px;
            /* iPhone 16 Pro-ish height */
            max-height: 95vh;
            background: #000;
            border-radius: 44px;
            padding: 12px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }

        /* The actual phone screen */
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 36px;
            overflow: hidden;
            background: #f5f5f7;
            position: relative;
        }

        /* ----- PLATFORM SELECTOR (overlay) ----- */
        .platform-selector {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            border-radius: 36px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .platform-selector.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        .platform-selector h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .platform-selector .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.5;
        }

        .platform-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 320px;
        }

        .platform-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            text-align: left;
        }

        .platform-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .platform-btn:active {
            transform: scale(0.97);
        }

        .platform-btn .icon {
            font-size: 32px;
            line-height: 1;
        }

        .platform-btn .label {
            display: flex;
            flex-direction: column;
        }

        .platform-btn .label small {
            font-weight: 400;
            font-size: 13px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .platform-btn.ios {
            background: rgba(0, 122, 255, 0.2);
            border-color: rgba(0, 122, 255, 0.3);
        }

        .platform-btn.android {
            background: rgba(52, 168, 83, 0.2);
            border-color: rgba(52, 168, 83, 0.3);
        }

        /* ----- BROWSER CHROME CONTAINERS ----- */
        .browser-container {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: #fff;
            position: relative;
            border-radius: 36px;
            overflow: hidden;
        }

        .browser-container.active {
            display: flex;
        }

        /* ============================================
        iOS 26 SAFARI – LIQUID GLASS DESIGN
        ============================================ */
        #safari-container {
            background: #f5f5f7;
        }

        /* Safari Content Area (takes remaining space) */
        .safari-content {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            padding: 20px 16px 100px;
            /* space for bottom toolbar */
            scroll-behavior: smooth;
        }

        /* Safari Bottom Toolbar – Liquid Glass */
        .safari-toolbar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px) saturate(1.4);
            -webkit-backdrop-filter: blur(30px) saturate(1.4);
            border-radius: 34px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            height: 52px;
            z-index: 10;
        }

        /* Collapsed state – smaller when scrolled */
        .safari-toolbar.collapsed {
            height: 38px;
            padding: 4px 12px;
            border-radius: 24px;
            backdrop-filter: blur(40px) saturate(1.6);
            -webkit-backdrop-filter: blur(40px) saturate(1.6);
        }

        .safari-toolbar .left-group,
        .safari-toolbar .right-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .safari-toolbar .url-pill {
            flex: 1;
            background: rgba(120, 120, 128, 0.12);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #1c1c1e;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
            letter-spacing: -0.2px;
        }

        .safari-toolbar.collapsed .url-pill {
            font-size: 11px;
            padding: 4px 12px;
            background: rgba(120, 120, 128, 0.08);
        }

        .safari-toolbar .icon-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #1c1c1e;
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .safari-toolbar .icon-btn:active {
            background: rgba(0, 0, 0, 0.08);
            transform: scale(0.92);
        }

        .safari-toolbar .icon-btn.more-btn {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -1px;
        }

        .safari-toolbar .icon-btn.tabs-btn {
            background: rgba(0, 122, 255, 0.10);
            font-weight: 600;
            font-size: 15px;
            color: #007aff;
            width: 32px;
            height: 32px;
            border-radius: 10px;
        }

        /* Safari status bar simulation */
        .safari-status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 20px 4px;
            font-size: 12px;
            font-weight: 600;
            color: #1c1c1e;
            background: transparent;
            position: relative;
            z-index: 5;
            letter-spacing: 0.3px;
        }

        /* ============================================
        ANDROID CHROME – MATERIAL YOU
        ============================================ */
        #chrome-container {
            background: #f8f9fa;
        }

        /* Chrome Top Bar */
        .chrome-topbar {
            background: #ffffff;
            padding: 8px 12px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        .chrome-topbar .back-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #3c4043;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .chrome-topbar .back-btn:active {
            background: rgba(0, 0, 0, 0.06);
        }

        .chrome-topbar .url-bar {
            flex: 1;
            background: #f1f3f4;
            border-radius: 24px;
            padding: 6px 16px;
            font-size: 14px;
            color: #1a1a1e;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            border: 0.5px solid transparent;
            transition: border 0.2s;
            height: 40px;
        }

        .chrome-topbar .url-bar .lock-icon {
            font-size: 14px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .chrome-topbar .url-bar .url-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        .chrome-topbar .url-bar .url-text .domain {
            font-weight: 500;
        }

        .chrome-topbar .menu-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #3c4043;
            cursor: pointer;
            padding: 4px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .chrome-topbar .menu-btn:active {
            background: rgba(0, 0, 0, 0.06);
        }

        /* Chrome Content */
        .chrome-content {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            padding: 20px 16px 90px;
            scroll-behavior: smooth;
        }

        /* Chrome Bottom Bar */
        .chrome-bottombar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 0.5px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 6px 8px 10px;
            flex-shrink: 0;
            z-index: 10;
        }

        .chrome-bottombar .bottom-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 10px;
            color: #5f6368;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            transition: background 0.15s;
            font-weight: 500;
        }

        .chrome-bottombar .bottom-btn .icon {
            font-size: 22px;
            line-height: 1.2;
        }

        .chrome-bottombar .bottom-btn:active {
            background: rgba(0, 0, 0, 0.04);
        }

        .chrome-bottombar .bottom-btn.active {
            color: #1a73e8;
        }

        /* ============================================
        SHARED CONTENT (Digital ATM screens)
        ============================================ */
        .step-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Simple content styling – will be expanded in later files */
        .step-content h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1c1c1e;
            letter-spacing: -0.3px;
        }

        .step-content p {
            font-size: 15px;
            line-height: 1.6;
            color: #3a3a3c;
            margin-bottom: 12px;
        }

        .step-content .btn-primary {
            display: inline-block;
            background: #007aff;
            color: #fff;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .step-content .btn-primary:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .step-content .step-indicator {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .step-content .product-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            border: 0.5px solid #e5e5ea;
        }

        .step-content .product-card .title {
            font-weight: 600;
            font-size: 15px;
            color: #1c1c1e;
        }

        .step-content .product-card .sub {
            font-size: 13px;
            color: #6c6c70;
            margin-top: 4px;
        }

        /* Navigation buttons at bottom of content */
        .content-nav {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-bottom: 8px;
        }

        .content-nav button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .content-nav .btn-back {
            background: #e5e5ea;
            color: #1c1c1e;
        }

        .content-nav .btn-back:active {
            background: #d1d1d6;
        }

        .content-nav .btn-next {
            background: #007aff;
            color: #fff;
        }

        .content-nav .btn-next:active {
            opacity: 0.8;
            transform: scale(0.97);
        }

        /* Customer type toggle */
        .customer-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: #f1f1f4;
            border-radius: 12px;
            padding: 4px;
        }

        .customer-toggle button {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s;
            background: transparent;
            color: #6c6c70;
        }

        .customer-toggle button.active {
            background: #ffffff;
            color: #1c1c1e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .customer-toggle button:active {
            transform: scale(0.96);
        }

        /* Scrollbar styling */
        .safari-content::-webkit-scrollbar,
        .chrome-content::-webkit-scrollbar {
            width: 3px;
        }

        .safari-content::-webkit-scrollbar-thumb,
        .chrome-content::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }

        /* ============================================
        RESPONSIVE
        ============================================ */
        @media (max-width: 480px) {
            .simulator-wrapper {
                border-radius: 0;
                padding: 0;
                max-height: 100vh;
                height: 100vh;
            }
            .phone-screen {
                border-radius: 0;
            }
            .platform-selector {
                border-radius: 0;
            }
            .browser-container {
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }

        @media (max-height: 700px) {
            .simulator-wrapper {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                padding: 0;
            }
            .phone-screen {
                border-radius: 0;
            }
            .platform-selector {
                border-radius: 0;
            }
            .browser-container {
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================
    SIMULATOR WRAPPER
    ============================================ -->
    <div class="simulator-wrapper">
        <div class="phone-screen">

            <!-- ==========================================
            PLATFORM SELECTOR
            ========================================== -->
            <div class="platform-selector" id="platformSelector">
                <h1>📱 Browser Simulator</h1>
                <p class="sub">Choose your browser to simulate the Digital ATM onboarding flow</p>
                <div class="platform-grid">
                    <button class="platform-btn ios" data-platform="safari">
                        <span class="icon">🧭</span>
                        <span class="label">
                            iOS 26 Safari
                            <small>Liquid Glass · Compact layout</small>
                        </span>
                    </button>
                    <button class="platform-btn android" data-platform="chrome">
                        <span class="icon">🌐</span>
                        <span class="label">
                            Android Chrome
                            <small>Material You · Latest version</small>
                        </span>
                    </button>
                </div>
            </div>

            <!-- ==========================================
            iOS 26 SAFARI
            ========================================== -->
            <div class="browser-container" id="safari-container">
                <!-- Status Bar -->
                <div class="safari-status-bar">
                    <span>9:41</span>
                    <span>📶 🔋</span>
                </div>

                <!-- Content -->
                <div class="safari-content" id="safariContent">
                    <!-- Step content will be injected here by JS -->
                    <div id="safariStepContainer"></div>
                </div>

                <!-- Bottom Toolbar – Liquid Glass -->
                <div class="safari-toolbar" id="safariToolbar">
                    <div class="left-group">
                        <button class="icon-btn" id="safariBackBtn" aria-label="Back">◀</button>
                    </div>
                    <div class="url-pill" id="safariUrl">digitalatm.com</div>
                    <div class="right-group">
                        <button class="icon-btn more-btn" aria-label="More">•••</button>
                        <button class="icon-btn tabs-btn" id="safariTabsBtn" aria-label="Tabs">0</button>
                    </div>
                </div>
            </div>

            <!-- ==========================================
            ANDROID CHROME
            ========================================== -->
            <div class="browser-container" id="chrome-container">
                <!-- Top Bar -->
                <div class="chrome-topbar">
                    <button class="back-btn" id="chromeBackBtn">‹</button>
                    <div class="url-bar">
                        <span class="lock-icon">🔒</span>
                        <span class="url-text" id="chromeUrl">
                            <span class="domain">digitalatm</span>.com
                        </span>
                    </div>
                    <button class="menu-btn" id="chromeMenuBtn">⋮</button>
                </div>

                <!-- Content -->
                <div class="chrome-content" id="chromeContent">
                    <div id="chromeStepContainer"></div>
                </div>

                <!-- Bottom Bar -->
                <div class="chrome-bottombar">
                    <button class="bottom-btn" id="chromeHomeBtn">
                        <span class="icon">🏠</span>
                        Home
                    </button>
                    <button class="bottom-btn" id="chromeNewTabBtn">
                        <span class="icon">➕</span>
                        New tab
                    </button>
                    <button class="bottom-btn active" id="chromeTabsBtn">
                        <span class="icon">🔲</span>
                        <span id="chromeTabCount">0</span>
                    </button>
                    <button class="bottom-btn" id="chromeMoreBtn">
                        <span class="icon">⋮</span>
                        More
                    </button>
                </div>
            </div>

        </div><!-- /phone-screen -->
    </div><!-- /simulator-wrapper -->

    <!-- ============================================
    JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ----- STATE -----
            const state = {
                platform: null, // 'safari' | 'chrome' | null
                customerType: 'core', // 'core' | 'vip'
                currentStep: 0,
                totalSteps: 15, // will be updated from data
                tabCount: 3,
            };

            // ----- DOM REFS -----
            const platformSelector = document.getElementById('platformSelector');
            const safariContainer = document.getElementById('safari-container');
            const chromeContainer = document.getElementById('chrome-container');
            const safariContent = document.getElementById('safariContent');
            const chromeContent = document.getElementById('chromeContent');
            const safariStepContainer = document.getElementById('safariStepContainer');
            const chromeStepContainer = document.getElementById('chromeStepContainer');
            const safariUrl = document.getElementById('safariUrl');
            const chromeUrl = document.getElementById('chromeUrl');
            const safariToolbar = document.getElementById('safariToolbar');
            const safariTabsBtn = document.getElementById('safariTabsBtn');
            const chromeTabCount = document.getElementById('chromeTabCount');

            // ----- MOCK DATA (will be replaced with full data.js later) -----
            const steps = {
                core: [
                    { title: 'Congratulations On Getting In', body: 'You made a great decision. Let\'s build your first one together, right now.' },
                    { title: 'Your First Piece Of Property', body: 'Right now, you\'re making a great decision. You already thought of something you own and love.' },
                    { title: 'Put Up The Thing You Love', body: 'Now we put up that thing on your countertop, the one you already own and love.' },
                    { title: 'Building Your Site', body: 'Nice work. We\'re pulling the details from Amazon for you right now.' },
                    { title: 'Make Sure This Is The One', body: 'We pulled it in for you from the product\'s Amazon link. Does this look right?' },
                    { title: 'Say Why You Love It', body: 'This is the move: you recommend it, someone buys it, and Amazon pays you.' },
                    { title: 'AI Helper', body: 'Tell us about this product. All three are optional.' },
                    { title: 'Preview', body: 'Here\'s your preview. This is what people will see.' },
                    { title: 'Name Your Digital ATM', body: 'This is the fun part. Don\'t overthink it, you can change it anytime.' },
                    { title: 'One Product Is The Win', body: 'You did it. You\'ve got everything you need to go live.' },
                    { title: 'Claim Your Address', body: 'This is the real address on the internet that points to your site.' },
                    { title: 'Go Live', body: 'Everything\'s ready, and it\'s all yours. Tap the button to make your site real.' },
                    { title: 'Look At What You Built', body: 'Stop and take this in. This is yours, and it\'s live.' },
                    { title: 'Bookmark This Page', body: 'One more thing, and you\'re set. Bookmark this Digital ATM page.' },
                    { title: 'Your Real Estate Is Live', body: 'You did the hard part today. You own a site now, with your first product on it.' }
                ],
                vip: [
                    { title: '🎯 Done-With-You · Priority', body: 'You went all in, and it shows. You\'re on the Done-With-You track now.' },
                    { title: 'Claim Your Done-With-You Setup Call', body: 'We\'ve done about 95% of the heavy lifting for you.' },
                    { title: 'Put Up The Thing You Love', body: 'Now we put up that thing on your countertop, the one you already own and love.' },
                    { title: 'Make Sure This Is The One', body: 'We pulled it in for you from the product\'s Amazon link.' },
                    { title: 'Say Why You Love It', body: 'This is the move: you recommend it, someone buys it, and Amazon pays you.' },
                    { title: 'AI Helper', body: 'Tell us about this product. All three are optional.' },
                    { title: 'Preview', body: 'Here\'s your preview. This is what people will see.' },
                    { title: 'Name Your Digital ATM', body: 'This is the fun part. Don\'t overthink it, you can change it anytime.' },
                    { title: 'One Product Is The Win', body: 'You did it. You\'ve got everything you need to go live.' },
                    { title: 'Claim Your Address', body: 'This is the real address on the internet that points to your site.' },
                    { title: 'Go Live', body: 'Everything\'s ready, and it\'s all yours.' },
                    { title: 'Look At What You Built', body: 'Stop and take this in. This is yours, and it\'s live.' }
                ]
            };

            // ----- RENDER STEP -----
            function renderStep() {
                const stepsArray = state.customerType === 'core' ? steps.core : steps.vip;
                state.totalSteps = stepsArray.length;
                const step = stepsArray[state.currentStep] || stepsArray[0];

                // Update tab count display
                safariTabsBtn.textContent = state.tabCount;
                chromeTabCount.textContent = state.tabCount;

                // Update URL
                const urlText = `digitalatm.com/step-${state.currentStep + 1}`;
                safariUrl.textContent = urlText;
                const domainMatch = urlText.match(/^([^.]+)/);
                chromeUrl.innerHTML = domainMatch ?
                    `<span class="domain">${domainMatch[1]}</span>.com/step-${state.currentStep + 1}` :
                    urlText;

                // Build HTML
                const stepNumber = state.currentStep + 1;
                const total = state.totalSteps;
                const customerLabel = state.customerType === 'core' ? 'Core Standard' : 'VIP Speedrun';

                const html = `
                    <div class="step-content active">
                        <div class="step-indicator">
                            ${customerLabel} · Step ${stepNumber} of ${total}
                        </div>
                        <h2>${step.title}</h2>
                        <p>${step.body}</p>

                        <div class="product-card">
                            <div class="title">📦 JBL Go 3 - Portable Mini Bluetooth Speaker</div>
                            <div class="sub">${state.customerType === 'core' ? 'JBL' : 'Owala FreeSip Sway'}</div>
                        </div>

                        <div class="content-nav">
                            <button class="btn-back" id="stepBackBtn">← Back</button>
                            <button class="btn-next" id="stepNextBtn">
                                ${state.currentStep === total - 1 ? '✅ Done' : 'Next →'}
                            </button>
                        </div>
                    </div>
                `;

                // Inject into both containers
                safariStepContainer.innerHTML = html;
                chromeStepContainer.innerHTML = html;

                // Re-bind step navigation
                document.getElementById('stepBackBtn')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (state.currentStep > 0) {
                        state.currentStep--;
                        renderStep();
                        scrollToTop();
                    }
                });

                document.getElementById('stepNextBtn')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (state.currentStep < state.totalSteps - 1) {
                        state.currentStep++;
                        renderStep();
                        scrollToTop();
                    }
                });

                // Update toolbar collapse state based on scroll
                updateToolbarCollapse();
            }

            // ----- TOOLBAR COLLAPSE (Safari) -----
            function updateToolbarCollapse() {
                const content = state.platform === 'safari' ? safariContent : chromeContent;
                const isScrolled = content.scrollTop > 20;
                if (state.platform === 'safari') {
                    safariToolbar.classList.toggle('collapsed', isScrolled);
                }
            }

            function scrollToTop() {
                const content = state.platform === 'safari' ? safariContent : chromeContent;
                content.scrollTop = 0;
                updateToolbarCollapse();
            }

            // ----- SWITCH PLATFORM -----
            function switchPlatform(platform) {
                state.platform = platform;

                // Hide selector
                platformSelector.classList.add('hidden');

                // Hide all containers
                safariContainer.classList.remove('active');
                chromeContainer.classList.remove('active');

                // Show selected
                if (platform === 'safari') {
                    safariContainer.classList.add('active');
                } else if (platform === 'chrome') {
                    chromeContainer.classList.add('active');
                }

                // Reset step to 0
                state.currentStep = 0;
                renderStep();

                // Attach scroll listeners for toolbar collapse
                const content = platform === 'safari' ? safariContent : chromeContent;
                content.addEventListener('scroll', updateToolbarCollapse);
            }

            // ----- CUSTOMER TYPE TOGGLE (to be exposed) -----
            window.setCustomerType = function(type) {
                if (type === 'core' || type === 'vip') {
                    state.customerType = type;
                    state.currentStep = 0;
                    renderStep();
                    scrollToTop();
                }
            };

            // ----- PLATFORM SELECTOR EVENTS -----
            document.querySelectorAll('.platform-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const platform = this.dataset.platform;
                    switchPlatform(platform);
                });
            });

            // ----- SAFARI BROWSER CONTROLS -----
            document.getElementById('safariBackBtn')?.addEventListener('click', function() {
                if (state.currentStep > 0) {
                    state.currentStep--;
                    renderStep();
                    scrollToTop();
                }
            });

            document.getElementById('safariTabsBtn')?.addEventListener('click', function() {
                state.tabCount = Math.min(state.tabCount + 1, 99);
                renderStep();
            });

            // ----- CHROME BROWSER CONTROLS -----
            document.getElementById('chromeBackBtn')?.addEventListener('click', function() {
                if (state.currentStep > 0) {
                    state.currentStep--;
                    renderStep();
                    scrollToTop();
                }
            });

            document.getElementById('chromeTabsBtn')?.addEventListener('click', function() {
                state.tabCount = Math.min(state.tabCount + 1, 99);
                renderStep();
            });

            document.getElementById('chromeHomeBtn')?.addEventListener('click', function() {
                state.currentStep = 0;
                renderStep();
                scrollToTop();
            });

            document.getElementById('chromeNewTabBtn')?.addEventListener('click', function() {
                state.tabCount = Math.min(state.tabCount + 1, 99);
                renderStep();
            });

            document.getElementById('chromeMenuBtn')?.addEventListener('click', function() {
                alert('Chrome menu opened (simulated)');
            });

            document.getElementById('chromeMoreBtn')?.addEventListener('click', function() {
                alert('Chrome more options (simulated)');
            });

            // ----- KEYBOARD SHORTCUTS (for testing) -----
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    if (state.currentStep < state.totalSteps - 1) {
                        state.currentStep++;
                        renderStep();
                        scrollToTop();
                    }
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    if (state.currentStep > 0) {
                        state.currentStep--;
                        renderStep();
                        scrollToTop();
                    }
                }
            });

            // ----- INIT -----
            // Start with platform selector visible, no browser active
            platformSelector.classList.remove('hidden');
            safariContainer.classList.remove('active');
            chromeContainer.classList.remove('active');

            console.log('📱 Digital ATM Browser Simulator loaded.');
            console.log('💡 Select a platform to begin.');
            console.log('🔄 Use Arrow keys (← →) to navigate steps.');
            console.log('👤 Switch customer type: window.setCustomerType("core"|"vip")');

        })();
    </script>

</body>
</html>
